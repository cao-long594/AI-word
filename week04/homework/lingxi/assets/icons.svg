<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <!-- 设置按钮图标 -->
    <symbol id="icon-settings" viewBox="0 0 24 24" >
        <circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="2" fill="none"/>
        <circle cx="19" cy="12" r="2" stroke="currentColor" stroke-width="2" fill="none"/>
        <circle cx="5" cy="12" r="2" stroke="currentColor" stroke-width="2" fill="none"/>
    </symbol>

    <!-- 太阳图标（亮色主题） -->
    <symbol id="icon-sun" viewBox="0 0 24 24" >
        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 月亮图标（暗色主题） -->
    <symbol id="icon-moon" viewBox="0 0 24 24" width="24" height="24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" fill="none"/>
    </symbol>

    <!-- 代码图标 -->
    <symbol id="icon-code" viewBox="0 0 24 24">
        <polyline points="16 18 22 12 16 6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></polyline>
        <polyline points="8 6 2 12 8 18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></polyline>
    </symbol>

    <!-- 礼物图标 -->
    <symbol id="icon-gift" viewBox="0 0 24 24">
        <rect x="4.5" y="9" width="15" height="10.5" rx="2.3"
              stroke="currentColor" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="4.5" y1="12.1" x2="19.5" y2="12.1" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
        <line x1="12" y1="9" x2="12" y2="19.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
        <path d="M12 9c-.4-1.7-1.4-2.8-2.8-2.8-1.2 0-2 .8-2 1.8 0 1.1 1 2 2.4 2H12z"
              stroke="currentColor" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 9c.4-1.7 1.4-2.8 2.8-2.8 1.2 0 2 .8 2 1.8 0 1.1-1 2-2.4 2H12z"
              stroke="currentColor" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M19.8 4.6l.5 1.1 1.1.5-1.1.5-.5 1.1-.5-1.1-1.1-.5 1.1-.5z"
              fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 派对图标 -->
    <symbol id="icon-party" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 11v10M7 14c-1 3 1 7 5 7s6-4 5-7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 播放图标 -->
    <symbol id="icon-play" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
        <polygon points="10 8 16 12 10 16" fill="currentColor"/>
    </symbol>

    <!-- 上传文件图标（曲别针） -->
    <symbol id="icon-paperclip" viewBox="0 0 24 24" >
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 发送图标（向上箭头） -->
    <symbol id="icon-send" viewBox="0 0 24 24" >
        <line x1="12" y1="20" x2="12" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <polyline points="6 12 12 6 18 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 回到底部图标（向下箭头） -->
    <symbol id="icon-arrow-down" viewBox="0 0 24 24" >
        <line x1="12" y1="4" x2="12" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <polyline points="6 12 12 18 18 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
 
    <!-- 停止图标（实心方块） -->
    <symbol id="icon-stop" viewBox="0 0 24 24" >
        <rect x="7" y="7" width="10" height="10" rx="2" fill="currentColor"/>
    </symbol>

    <!-- 删除/清除图标 -->
    <symbol id="icon-trash" viewBox="0 0 24 24" >
        <polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="10" y1="11" x2="10" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
        <line x1="14" y1="11" x2="14" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
    </symbol>
</svg>


